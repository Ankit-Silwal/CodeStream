services:
  postgres:
    image: postgres:15
    container_name: codestream_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codestream
    ports:
      - "2222:2222"
    volumes:
      - pg_data:/var/lib/postgresql/data
    command: ["postgres", "-p", "2222"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codestream -p 2222"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: codestream_redis
    restart: always
    command: ["redis-server", "--port", "6969"]
    ports:
      - "6969:6969"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6969", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: codestream_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: codestream_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: codestream_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file:
      - .env

volumes:
  pg_data: